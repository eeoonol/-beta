<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연세라크로스 훈련일지</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eaf4ff, #f7fbff);
      color: #16324f;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 28px;
      justify-content: center;
      align-items: center;
    }

    .active {
      display: flex;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(55, 120, 200, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    h1 {
      text-align: center;
      font-size: 34px;
      margin-bottom: 32px;
      color: #0d3b66;
    }

    h2 {
      margin-top: 0;
      color: #0d3b66;
    }

    input, textarea {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 20px;
      padding: 16px;
      margin: 10px 0;
      font-size: 16px;
      background: rgba(235, 245, 255, 0.9);
      color: #16324f;
    }

    textarea {
      height: 180px;
      resize: none;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 22px;
      padding: 16px;
      margin-top: 12px;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #3a8dde, #5aa9ff);
      color: white;
      box-shadow: 0 10px 24px rgba(58, 141, 222, 0.28);
      cursor: pointer;
    }

    .sub-btn {
      background: transparent;
      color: #2f7ecb;
      box-shadow: none;
      margin-top: 8px;
    }

    .notice-box, .entry-box {
      background: rgba(255, 255, 255, 0.72);
      border-radius: 24px;
      padding: 18px;
      margin: 14px 0;
      box-shadow: 0 10px 24px rgba(55, 120, 200, 0.12);
    }

    .admin-list {
      max-height: 380px;
      overflow-y: auto;
    }

    .small {
      font-size: 13px;
      color: #6b7f95;
    }
  </style>
</head>

<body>
  <section id="home" class="screen active">
    <div class="card">
      <h1>연세라크로스<br>훈련일지</h1>
      <input id="nameInput" placeholder="이름을 입력하세요" />
      <button onclick="enterUser()">확인</button>
      <button class="sub-btn" onclick="showScreen('adminLogin')">관리자 로그인하기</button>
    </div>
  </section>

  <section id="userPage" class="screen">
    <div class="card">
      <h2 id="welcomeText"></h2>

      <div class="notice-box">
        <strong>오늘의 공지</strong>
        <p id="noticeText">아직 등록된 공지가 없습니다.</p>
      </div>

      <textarea id="diaryInput" placeholder="오늘 훈련일지를 작성하세요"></textarea>
      <button onclick="submitDiary()">제출하기</button>
      <button class="sub-btn" onclick="showScreen('home')">처음으로</button>
    </div>
  </section>

  <section id="adminLogin" class="screen">
    <div class="card">
      <h2>관리자 로그인</h2>
      <input id="adminId" placeholder="아이디" />
      <input id="adminPw" type="password" placeholder="비밀번호" />
      <button onclick="loginAdmin()">로그인</button>
      <button class="sub-btn" onclick="showScreen('home')">돌아가기</button>
    </div>
  </section>

  <section id="adminPage" class="screen">
    <div class="card">
      <h2>관리자 화면</h2>

      <input id="noticeInput" placeholder="새 공지를 입력하세요" />
      <button onclick="saveNotice()">공지 등록하기</button>

      <h3>제출된 훈련일지</h3>
      <div id="diaryList" class="admin-list"></div>

      <button class="sub-btn" onclick="showScreen('home')">로그아웃</button>
    </div>
  </section>

  <script>
    let currentUser = "";
    let notice = localStorage.getItem("notice") || "아직 등록된 공지가 없습니다.";
    let diaries = JSON.parse(localStorage.getItem("diaries")) || [];

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function enterUser() {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) {
        alert("이름을 입력해주세요.");
        return;
      }

      currentUser = name;
      document.getElementById("welcomeText").innerText = name + "님의 훈련일지";
      document.getElementById("noticeText").innerText = notice;
      showScreen("userPage");
    }

    function submitDiary() {
      const text = document.getElementById("diaryInput").value.trim();
      if (!text) {
        alert("훈련일지를 작성해주세요.");
        return;
      }

      diaries.push({
        name: currentUser,
        notice: notice,
        text: text,
        date: new Date().toLocaleString()
      });

      localStorage.setItem("diaries", JSON.stringify(diaries));
      document.getElementById("diaryInput").value = "";
      alert("훈련일지가 제출되었습니다.");
    }

    function loginAdmin() {
      const id = document.getElementById("adminId").value;
      const pw = document.getElementById("adminPw").value;

      if (id === "admin" && pw === "1234") {
        renderDiaries();
        showScreen("adminPage");
      } else {
        alert("아이디 또는 비밀번호가 틀렸습니다.");
      }
    }

    function saveNotice() {
      const newNotice = document.getElementById("noticeInput").value.trim();
      if (!newNotice) {
        alert("공지 내용을 입력해주세요.");
        return;
      }

      notice = newNotice;
      localStorage.setItem("notice", notice);
      document.getElementById("noticeInput").value = "";
      alert("공지가 등록되었습니다.");
    }

    function renderDiaries() {
      const list = document.getElementById("diaryList");
      list.innerHTML = "";

      if (diaries.length === 0) {
        list.innerHTML = "<p class='small'>아직 제출된 훈련일지가 없습니다.</p>";
        return;
      }

      diaries.slice().reverse().forEach(d => {
        const div = document.createElement("div");
        div.className = "entry-box";
        div.innerHTML = `
          <strong>${d.name}</strong>
          <p class="small">${d.date}</p>
          <p><b>공지:</b> ${d.notice}</p>
          <p>${d.text}</p>
        `;
        list.appendChild(div);
      });
    }
  </script>
</body>
</html>
